
version: 2
project_name: goTFHub
report_sizes: false
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
builds:
  - id: default
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    no_unique_dist_dir: true
    dir: .
    main: .
    binary: "bin/{{ .Version }}/{{ .Os }}/{{ .Arch }}/gotfhub"

    builder: go
    gobinary: go
    command: build
    env:
      - CGO_ENABLED=0


