brews:
  - name: gotfhub
    repository:
      owner: planesailingio
      name: homebrew-tools
      branch: main
      git:
        private_key: /Users/server/.ssh/id_rsa

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

gomod:
  gobinary: go

changelog:
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^updaated'

release:
  github:
    owner: planesailingio
    name: gotfhub
  name_template: "{{.ProjectName}} v{{.Version}}"

  draft: false
  mode: replace
  header: |
    # 🚀 A new goTFHub release
    Thanks for checking this version out, find out more below.

  footer: |
    ## Thanks for supporting,

    Those were the changes on {{ .Tag }}!
    Don't forget if you like the tool, don't forget to star it ⭐!
  skip_upload: false
  disable: false
